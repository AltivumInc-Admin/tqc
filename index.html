<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="The Quantum Collective is the private, members-only network for funded quantum founders. Curated peer groups, warm capital introductions, and domain-deep acceleration. Application only. $300/month."
    />
    <meta name="theme-color" content="#E7E1D4" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta property="og:title" content="The Quantum Collective — The Private Network for Funded Quantum Founders" />
    <meta
      property="og:description"
      content="The room where the people building the quantum economy share deal flow, hard-won lessons, and warm access to capital, customers, and talent. One intro pays for the year."
    />
    <meta property="og:type" content="website" />
    <title>The Quantum Collective — The Private Network for Funded Quantum Founders</title>
    <script>
      /* Apply the saved palette before first paint to avoid a flash.
         Hexes mirror THEMES in src/components/PaletteToggle.jsx. */
      try {
        var t = localStorage.getItem('tqc-theme')
        if (t && t !== 'ember') {
          document.documentElement.dataset.theme = t
          var m = document.querySelector('meta[name="theme-color"]')
          if (m && t === 'olive') m.setAttribute('content', '#E3E4DC')
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
