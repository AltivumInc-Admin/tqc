version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 22
        - npm ci
        # Red backend tests block the deploy — the checkout handler's edge
        # cases ride the same repo as the frontend
        - npm test
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
